<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3A0D6E"/>
      <stop offset="100%" style="stop-color:#6A35B0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="970" cy="80" r="250" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1090" cy="540" r="185" fill="rgba(255,255,255,0.04)"/>
  <circle cx="90" cy="550" r="155" fill="rgba(255,255,255,0.04)"/>

  <!-- Chart / accounting icon -->
  <g transform="translate(450, 130)">
    <!-- Chart frame -->
    <rect x="0" y="0" width="300" height="250" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <!-- Chart bars -->
    <rect x="30" y="150" width="40" height="70" rx="4" fill="rgba(255,255,255,0.2)"/>
    <rect x="85" y="110" width="40" height="110" rx="4" fill="rgba(255,255,255,0.3)"/>
    <rect x="140" y="80" width="40" height="140" rx="4" fill="rgba(255,255,255,0.22)"/>
    <rect x="195" y="50" width="40" height="170" rx="4" fill="rgba(255,255,255,0.35)"/>
    <rect x="250" y="90" width="20" height="130" rx="3" fill="rgba(255,255,255,0.18)"/>
    <!-- Trend line -->
    <polyline points="50,140 105,100 160,75 215,45 265,82" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Axes -->
    <line x1="20" y1="225" x2="280" y2="225" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="20" y1="20" x2="20" y2="225" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  </g>

  <!-- Badge -->
  <rect x="430" y="100" width="140" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
  <text x="500" y="121" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">EGECAM.CM</text>

  <!-- Title -->
  <text x="600" y="496" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">VEILLE COMPTABLE</text>
  <text x="600" y="524" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="3">PRISMA GESTION · CAMEROUN</text>
  <rect x="500" y="540" width="200" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
</svg>
