<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1828"/>
      <stop offset="100%" style="stop-color:#1A3D6A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="960" cy="85" r="255" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1090" cy="530" r="185" fill="rgba(255,255,255,0.04)"/>
  <circle cx="85" cy="548" r="148" fill="rgba(255,255,255,0.04)"/>

  <!-- Container ship icon -->
  <g transform="translate(360, 130)">
    <!-- Water -->
    <path d="M0 260 Q60 245 120 260 Q180 275 240 260 Q300 245 360 260 Q420 275 480 260 L480 290 L0 290 Z" fill="rgba(255,255,255,0.08)"/>
    <!-- Ship hull -->
    <path d="M60 220 L420 220 L400 270 L80 270 Z" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- Containers row 1 -->
    <rect x="80" y="170" width="70" height="50" rx="4" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="158" y="170" width="70" height="50" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="236" y="170" width="70" height="50" rx="4" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="314" y="170" width="70" height="50" rx="4" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- Containers row 2 -->
    <rect x="100" y="120" width="70" height="50" rx="4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <rect x="178" y="120" width="70" height="50" rx="4" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <rect x="256" y="120" width="70" height="50" rx="4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <!-- Bridge/cabin -->
    <rect x="340" y="80" width="60" height="90" rx="4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <rect x="350" y="90" width="15" height="12" rx="2" fill="rgba(255,255,255,0.25)"/>
    <rect x="372" y="90" width="15" height="12" rx="2" fill="rgba(255,255,255,0.25)"/>
    <!-- Crane -->
    <line x1="120" y1="60" x2="120" y2="170" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
    <line x1="80" y1="60" x2="250" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
    <line x1="200" y1="60" x2="200" y2="170" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="5,4"/>
  </g>

  <!-- Badge -->
  <rect x="424" y="100" width="152" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
  <text x="500" y="121" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">DGICAM</text>

  <!-- Title -->
  <text x="600" y="496" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">VEILLE DOUANIÈRE</text>
  <text x="600" y="524" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="3">PRISMA GESTION · CAMEROUN</text>
  <rect x="500" y="540" width="200" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
</svg>
