<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D2B5C"/>
      <stop offset="100%" style="stop-color:#1A4A9A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="960" cy="90" r="260" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1080" cy="530" r="190" fill="rgba(255,255,255,0.04)"/>
  <circle cx="100" cy="540" r="150" fill="rgba(255,255,255,0.04)"/>

  <!-- Shield / protection icon -->
  <g transform="translate(510, 130)">
    <path d="M90 0 L180 40 L180 140 Q180 210 90 250 Q0 210 0 140 L0 40 Z" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- People inside shield -->
    <circle cx="90" cy="90" r="28" fill="rgba(255,255,255,0.18)"/>
    <ellipse cx="90" cy="155" rx="38" ry="22" fill="rgba(255,255,255,0.14)"/>
    <!-- Check mark -->
    <polyline points="65,90 82,107 118,72" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Badge -->
  <rect x="438" y="100" width="124" height="32" rx="16" fill="rgba(255,255,255,0.15)"/>
  <text x="500" y="121" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">CNPS.CM</text>

  <!-- Title -->
  <text x="600" y="496" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">VEILLE SOCIALE</text>
  <text x="600" y="524" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="3">PRISMA GESTION · CAMEROUN</text>
  <rect x="500" y="540" width="200" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
